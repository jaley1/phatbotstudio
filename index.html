<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhatBot Studio</title>
    <!-- Light-weight Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-dark: #050508;
            --card-dark: rgba(10, 10, 18, 0.75);
            --accent-glow: #3b82f6;
            --accent-green: #10b981;
            --text-main: #f4f4f5;
            --text-muted: #71717a;
            --border-color: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-top: 2.5rem;
            margin-bottom: 2rem;
            width: 90%;
            max-width: 950px;
        }

        h1 {
            font-size: 2.8rem;
            margin: 0;
            background: linear-gradient(135deg, var(--accent-glow), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            letter-spacing: -0.06em;
            text-transform: uppercase;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-top: 0.6rem;
            font-size: 0.95rem;
        }

        .tab-container {
            display: flex;
            gap: 10px;
            width: 90%;
            max-width: 950px;
            margin-bottom: 1.2rem;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 0.85rem 1.8rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.25s;
        }

        .tab-btn.active {
            background: rgba(59, 130, 246, 0.1);
            color: white;
            border-color: var(--accent-glow);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.25);
        }

        .panel {
            display: none;
            width: 90%;
            max-width: 950px;
            background: var(--card-dark);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            box-sizing: border-box;
        }

        .panel.active {
            display: block;
        }

        .workspace-layout {
            display: flex;
            min-height: 550px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .workspace-layout {
                flex-direction: column;
            }
            .sidebar-control {
                width: 100% !important;
                border-right: none !important;
                border-bottom: 1px solid var(--border-color);
            }
        }

        .sidebar-control {
            width: 320px;
            border-right: 1px solid var(--border-color);
            padding: 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 18px;
            background: rgba(0, 0, 0, 0.15);
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .sidebar-control label {
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .sidebar-control textarea {
            width: 100%;
            height: 140px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: white;
            padding: 0.8rem;
            box-sizing: border-box;
            resize: none;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .sidebar-control textarea:focus {
            border-color: var(--accent-glow);
        }

        #image-panel .sidebar-control textarea:focus {
            border-color: var(--accent-green);
        }

        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.3);
            min-height: 400px;
            position: relative;
        }

        .chat-display {
            flex: 1;
            padding: 1.8rem;
            overflow-y: auto;
            max-height: 530px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-sizing: border-box;
        }

        .message {
            max-width: 90%;
            padding: 1rem 1.25rem;
            border-radius: 14px;
            font-size: 0.98rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        /* Beautiful Markdown Styling Elements inside Chat */
        .message p { margin: 0 0 0.8rem 0; }
        .message p:last-child { margin-bottom: 0; }
        .message h1, .message h2, .message h3 { margin: 0.5rem 0 0.5rem 0; font-size: 1.2rem; color: #fff; }
        .message hr { border: none; border-top: 1px solid var(--border-color); margin: 1rem 0; }
        
        .message table {
            width: 100%;
            border-collapse: collapse;
            margin: 0.8rem 0;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
            overflow: hidden;
        }
        .message th, .message td {
            padding: 8px 12px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: left;
        }
        .message th { background: rgba(255,255,255,0.05); font-weight: bold; }

        .message.user {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(59, 130, 246, 0.05));
            border: 1px solid rgba(59, 130, 246, 0.25);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .message.assistant {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .image-canvas {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .image-canvas img {
            max-width: 100%;
            max-height: 480px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            object-fit: contain;
        }

        button.action-btn {
            background: var(--text-main);
            color: black;
            border: none;
            padding: 0.85rem 1.8rem;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.92rem;
            transition: transform 0.2s, opacity 0.15s;
            width: 100%;
        }

        button.action-btn:active {
            transform: scale(0.98);
        }

        .status-tracker {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: center;
            font-weight: 500;
            margin-top: 5px;
        }

        .spinner {
            display: none;
            border: 3px solid rgba(255, 255, 255, 0.05);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border-left-color: var(--accent-glow);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <h1>PhatBot Neo Studio</h1>
        <p class="subtitle">Zero Setup • Keyless Infrastructure • Sandbox Framework</p>
    </header>

    <div class="tab-container">
        <button id="btn-chat" class="tab-btn active" onclick="switchTab('chat')">💬 Conversational AI</button>
        <button id="btn-image" class="tab-btn" onclick="switchTab('image')">🎨 Digital Art Room</button>
    </div>

    <!-- PANEL 1: CONVERSATIONAL ENGINE -->
    <div id="chat-panel" class="panel active">
        <div class="workspace-layout">
            <div class="sidebar-control">
                <label>PROMPT CONVERSATION</label>
                <textarea id="chat-input" placeholder="Type your message here to query the network..."></textarea>
                <button class="action-btn" onclick="runChat()" style="background: var(--accent-glow); color: white;">Send Query</button>
                <div class="status-tracker" id="chat-status">System Live</div>
            </div>
            <div class="main-stage">
                <div class="chat-display" id="chatbox">
                    <div id="welcome-message" class="message assistant">Terminal online. No API key or account creation required. Use the input box to the left to prompt the network.</div>
                </div>
            </div>
        </div>
    </div>

    <!-- PANEL 2: DIGITAL ART ROOM -->
    <div id="image-panel" class="panel">
        <div class="workspace-layout">
            <div class="sidebar-control">
                <label>PROMPT SPECIFICATION</label>
                <textarea id="image-prompt" placeholder="Describe your masterpiece (e.g., A hyperrealistic chrome robotic tiger sitting on a neon skyscraper, synthwave aesthetic)"></textarea>
                <button class="action-btn" onclick="generateImage()" style="background: var(--accent-green); color: white;">Render Frame</button>
                <div class="status-tracker" id="img-status">Canvas Engine Idle</div>
            </div>
            <div class="main-stage">
                <div class="image-canvas" id="canvas-view">
                    <div class="spinner" id="img-spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let messagesArray = [{ role: "system", content: "You are PhatBot, a helpful, advanced, highly conversational AI assistant. Respond warmly, fluidly, and naturally like an expert friend." }];
        let firstMessageSent = false;

        function switchTab(target) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            
            if(target === 'chat') {
                document.getElementById('btn-chat').classList.add('active');
                document.getElementById('chat-panel').classList.add('active');
            } else {
                document.getElementById('btn-image').classList.add('active');
                document.getElementById('image-panel').classList.add('active');
            }
        }

        async function runChat() {
            const inputField = document.getElementById('chat-input');
            const chatbox = document.getElementById('chatbox');
            const statusTracker = document.getElementById('chat-status');
            const userText = inputField.value.trim();

            if (!userText) return;

            if (!firstMessageSent) {
                const welcomeNode = document.getElementById('welcome-message');
                if (welcomeNode) welcomeNode.remove();
                firstMessageSent = true;
            }

            statusTracker.innerText = "Processing response...";
            appendMessage(userText, 'user');
            inputField.value = '';
            messagesArray.push({ role: "user", content: userText });

            const botMessageDiv = appendMessage("Thinking...", 'assistant');

            try {
                const response = await fetch('https://text.pollinations.ai/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        messages: messagesArray, 
                        model: "openai" 
                    })
                });

                const data = await response.text();
                
                // Parse markdown into clean HTML structure
                botMessageDiv.innerHTML = marked.parse(data.trim());
                
                messagesArray.push({ role: "assistant", content: data.trim() });
                statusTracker.innerText = "System Live";
            } catch (error) {
                console.error(error);
                botMessageDiv.innerText = "Connection lost. Please try your message again.";
                statusTracker.innerText = "Connection error.";
            }

            chatbox.scrollTop = chatbox.scrollHeight;
        }

        function appendMessage(text, sender) {
            const chatbox = document.getElementById('chatbox');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            if(sender === 'user') {
                messageDiv.innerText = text;
            } else {
                messageDiv.innerText = text; // temporary while loading
            }
            chatbox.appendChild(messageDiv);
            chatbox.scrollTop = chatbox.scrollHeight;
            return messageDiv;
        }

        function generateImage() {
            const promptField = document.getElementById('image-prompt');
            const statusTracker = document.getElementById('img-status');
            const spinner = document.getElementById('img-spinner');
            const canvasView = document.getElementById('canvas-view');
            const promptText = promptField.value.trim();

            if (!promptText) {
                statusTracker.innerText = "Please specify an art prompt.";
                return;
            }

            statusTracker.innerText = "Generating asset...";
            spinner.style.display = "block";
            
            const priorImg = canvasView.querySelector('img');
            if(priorImg) priorImg.remove();

            const optimizedSeed = Math.floor(Math.random() * 999999);
            const encodedPrompt = encodeURIComponent(promptText);
            const imageDeliveryUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=1024&height=1024&seed=${optimizedSeed}&nologo=true`;

            const imageObject = new Image();
            imageObject.src = imageDeliveryUrl;

            imageObject.onload = function() {
                spinner.style.display = "none";
                statusTracker.innerText = "Render Complete.";
                canvasView.appendChild(imageObject);
            };

            imageObject.onerror = function() {
                spinner.style.display = "none";
                statusTracker.innerText = "Render failed.";
            };
        }

        document.getElementById('chat-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                runChat();
            }
        });
    </script>
</body>
</html>
