<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhatBot Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-dark: #050508;
            --card-dark: rgba(10, 10, 18, 0.75);
            --accent-glow: #3b82f6;
            --accent-green: #10b981;
            --text-main: #f4f4f5;
            --text-muted: #71717a;
            --border-color: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-top: 2.5rem;
            margin-bottom: 2rem;
            width: 90%;
            max-width: 950px;
        }

        h1 {
            font-size: 2.8rem;
            margin: 0;
            background: linear-gradient(135deg, var(--accent-glow), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            letter-spacing: -0.06em;
            text-transform: uppercase;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-top: 0.6rem;
            font-size: 0.95rem;
        }

        .tab-container {
            display: flex;
            gap: 10px;
            width: 90%;
            max-width: 950px;
            margin-bottom: 1.2rem;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 0.85rem 1.8rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.25s;
        }

        .tab-btn.active {
            background: rgba(59, 130, 246, 0.1);
            color: white;
            border-color: var(--accent-glow);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.25);
        }

        .panel {
            display: none;
            width: 90%;
            max-width: 950px;
            background: var(--card-dark);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            box-sizing: border-box;
        }

        .panel.active {
            display: block;
        }

        .workspace-layout {
            display: flex;
            min-height: 550px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .workspace-layout {
                flex-direction: column;
            }
            .sidebar-control {
                width: 100% !important;
                border-right: none !important;
                border-bottom: 1px solid var(--border-color);
            }
        }

        .sidebar-control {
            width: 320px;
            border-right: 1px solid var(--border-color);
            padding: 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 18px;
            background: rgba(0, 0, 0, 0.15);
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .sidebar-control label {
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .sidebar-control textarea {
            width: 100%;
            height: 140px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: white;
            padding: 0.8rem;
            box-sizing: border-box;
            resize: none;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .sidebar-control textarea:focus {
            border-color: var(--accent-glow);
        }

        #image-panel .sidebar-control textarea:focus {
            border-color: var(--accent-green);
        }

        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.3);
            min-height: 400px;
            position: relative;
        }

        .chat-display {
            flex: 1;
            padding: 1.8rem;
            overflow-y: auto;
            max-height: 530px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-sizing: border-box;
        }

        .message {
            max-width: 90%;
            padding: 1rem 1.25rem;
            border-radius: 14px;
            font-size: 0.98rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message p { margin: 0 0 0.8rem 0; }
        .message p:last-child { margin-bottom: 0; }
        .message h1, .message h2, .message h3 { margin: 0.5rem 0 0.5rem 0; font-size: 1.2rem; color: #fff; }
        .message hr { border: none; border-top: 1px solid var(--border-color); margin: 1rem 0; }
        
        .message table {
            width: 100%;
            border-collapse: collapse;
            margin: 0.8rem 0;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
            overflow: hidden;
        }
        .message th, .message td {
            padding: 8px 12px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: left;
        }
